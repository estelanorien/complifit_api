steps:
  # Emit a log line immediately so "No logs" does not happen; use LEGACY so logs show in UI
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Build started: PROJECT_ID=$PROJECT_ID COMMIT_SHA=$COMMIT_SHA REGION=europe-west1 ==="
        echo "=== If this line appears, logging is working ==="

  # Build the container image (linux/amd64 for Cloud Run)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--platform', 'linux/amd64', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vitality-api:$COMMIT_SHA', '.']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vitality-api:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vitality-api'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vitality-api:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300s'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--cpu-boost'
      - '--execution-environment'
      - 'gen2'
      # Environment variables should be set in Cloud Run UI or via Secret Manager
      # DO NOT hardcode sensitive values here!
      # Use: gcloud run services update vitality-api --update-env-vars KEY=VALUE
      # Or set them in Cloud Run Console > Service > Edit & Deploy New Revision > Variables & Secrets

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/vitality-api:$COMMIT_SHA'

options:
  # LEGACY = logs in both Cloud Storage and Cloud Logging so they show in Build History UI
  logging: LEGACY

